services:
  postgres:
    image: postgres:16
    container_name: contract-intel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ci
      POSTGRES_PASSWORD: ci
      POSTGRES_DB: contract_intel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ci -d contract_intel"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
