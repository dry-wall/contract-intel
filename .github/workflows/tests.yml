name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ai-service-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai_service
    env:
      GCP_PROJECT_ID: test-project
      GCP_REGION: asia-south1
      VERTEX_LOCATION: us-central1
      GCS_BUCKET: test-bucket
      PUBSUB_UPLOAD_TOPIC: document-uploaded
      PUBSUB_PROCESSED_TOPIC: document-processed
      BQ_DATASET: contract_intel
      CHROMA_PATH: ./.chroma
      EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
      LLM_EXTRACT_MODEL: gemini-2.5-flash-lite
      LLM_RISK_MODEL: gemini-2.5-pro
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run tests
        run: uv run pytest tests/ -v

  django-app-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: django_app
    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      GCP_PROJECT_ID: test-project
      DJANGO_SA_EMAIL: test@test.iam.gserviceaccount.com
      AI_SA_EMAIL: test@test.iam.gserviceaccount.com
      DJANGO_SECRET_KEY: ci-test-secret-key
      DATABASE_URL: sqlite:///ci_test.sqlite3
      DJANGO_CALLBACK_SECRET: test
      GCS_BUCKET: test-bucket
      BQ_DATASET: contract_intel
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen
      - name: Collect static files
        run: uv run python manage.py collectstatic --noinput
      - name: Run tests
        run: uv run python manage.py test analytics documents -v 2
